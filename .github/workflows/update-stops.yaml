name: Update stops index

on:
    schedule:
        - cron: "0 4 1 * *"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    update-stops:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Regenerate stops index
              run: python scripts/generate_stops_index.py

            - name: Commit changes if any
              run: |
                  if [[ -n "$(git status --porcelain custom_components/tan_nantes/data/stops_index.json)" ]]; then
                      git config user.name "github-actions[bot]"
                      git config user.email "github-actions[bot]@users.noreply.github.com"
                      git add custom_components/tan_nantes/data/stops_index.json
                      git commit -m "chore: update stops index"
                      git push
                  else
                      echo "Stops index already up to date."
                  fi
